<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
        .navbar { background: #1a1a1a; color: white; padding: 15px; display: flex; gap: 15px; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .navbar button { background: transparent; border: 1px solid #4ade80; color: #4ade80; padding: 8px 18px; cursor: pointer; border-radius: 4px; font-weight: 600; }
        .navbar button.active { background: #4ade80; color: #1a1a1a; }
        
        .app-container { max-width: 850px; margin: 20px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        
        .sender-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; margin-bottom: 20px; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 12px; border-radius: 5px; color: white; font-weight: 600; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        
        /* PRINT TEMPLATE - IMPROVED WITH FOOTER */
        #printArea { 
            display: none; 
            width: 210mm; 
            padding: 15mm 20mm; 
            background: white; 
            position: relative; 
            box-sizing: border-box; 
            margin: auto;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .lh-header { 
            text-align: center; 
            border-bottom: 2px solid #000; 
            padding-bottom: 5px; 
            margin-bottom: 20px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2px;
        }
        
        .lh-logo { 
            max-width: 50px; 
            height: auto;
        }
        
        .lh-org { 
            font-size: 18px; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin: 0;
            letter-spacing: 1px;
        }
        
        .reg-no {
            font-size: 9px;
            color: #555;
            margin-top: 2px;
            line-height: 1.2;
        }
        
        .doc-meta { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px; 
            font-size: 12px;
            font-weight: 500;
        }
        
        .doc-body { 
            line-height: 1.6; 
            text-align: justify; 
            font-size: 12px; 
            white-space: pre-wrap; 
            min-height: 350px;
            margin-bottom: 40px;
        }
        
        .lh-sign { 
            margin-top: 50px; 
            margin-bottom: 40px;
            font-size: 12px;
        }
        
        /* FOOTER STYLES */
        .footer {
            position: relative;
            bottom: 0;
            left: 0;
            right: 0;
            margin-top: 50px;
            padding-top: 8px;
            border-top: 1px solid #ccc;
            font-size: 9px;
            text-align: center;
            color: #555;
            line-height: 1.4;
        }
        
        .footer-address {
            margin-bottom: 3px;
        }
        
        .footer-contact {
            font-size: 8px;
        }
        
        @media print {
            .no-print { display: none !important; }
            #printArea { 
                display: block !important;
                padding: 10mm 15mm;
            }
            .footer {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: white;
                padding: 8px 20mm;
            }
            .doc-body {
                margin-bottom: 30px;
            }
        }
        
        .loading { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; z-index: 9999; }
    </style>
</head>
<body>

<div class="loading" id="loading">Saving...</div>

<div class="navbar no-print">
    <button id="btnL" class="active" onclick="changeMode('Letter')">1st Letter</button>
    <button id="btnA" onclick="changeMode('Application')">2nd Applicant</button>
</div>

<div class="app-container no-print">
    <h2 id="title">Develish One Foundation Portal</h2>
    
    <div class="sender-box">
        <label style="color: #2980b9;">SENDER DETAILS (Your Info)</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="senderName" placeholder="Your Name (e.g., John Doe)">
            <input type="text" id="senderPos" placeholder="Your Position (e.g., Secretary)">
        </div>
    </div>

    <div class="input-group">
        <label>Ref / App Number *</label>
        <input type="text" id="refNo" placeholder="D1F/2026/001">
    </div>
    <div class="input-group">
        <label>Recipient / To Details</label>
        <textarea id="recipient" rows="2" placeholder="Receiver Name & Address"></textarea>
    </div>
    <div class="input-group">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="Document Subject">
    </div>
    <div class="input-group">
        <label>Matter *</label>
        <textarea id="matter" rows="8" placeholder="Type your letter content..."></textarea>
    </div>

    <div class="button-row">
        <button class="btn" style="background: #2980b9;" onclick="saveToSheet()"> Save to Sheet</button>
        <button class="btn" style="background: #27ae60;" onclick="printDocument()">️ Print</button>
        <button class="btn" style="background: #e67e22;" onclick="downloadPDF()"> Download PDF</button>
    </div>
</div>

<div id="printArea">
    <!-- HEADER - Compact with small logo and minimal gaps -->
    <div class="lh-header">
        <div class="logo-container">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhEU8w_H9L2saAhkasgsXa74PpTuuqDCLfI6xlOX-x15imG0Zh22m7QH0K6aOY806F5N2btYWn9596nIsYGClysoH_9zUZZn5sU8BuFAQRf-oNSKRK9twSKkfLrFETAZEQ9htTmyi302UVBTp06iKReiN9AHdiiWNo6fRbdf9pycFXwvwKCl88SHr_osLf8/s320/1000071813.png" class="lh-logo">
            <div class="lh-org">Develish One Foundation</div>
        </div>
        <div class="reg-no">Reg No: U88900UP2025NPL220764</div>
    </div>
    
    <!-- DOCUMENT METADATA -->
    <div class="doc-meta">
        <div>Ref: <span id="pRef"></span></div>
        <div>Date: <span id="pDate"></span></div>
    </div>
    
    <!-- RECIPIENT -->
    <div style="margin-bottom:15px; font-weight:500;" id="pTo"></div>
    
    <!-- SUBJECT -->
    <div style="margin-bottom:15px; font-weight:bold; text-decoration:underline;">Subject: <span id="pSub"></span></div>
    
    <!-- MAIN CONTENT -->
    <div class="doc-body" id="pMat"></div>
    
    <!-- SIGNATURE -->
    <div class="lh-sign">
        Sincerely,<br><br><br>
        <strong id="pSignName"></strong><br>
        <span id="pSignPos"></span><br>
        Develish One Foundation
    </div>
    
    <!-- FOOTER WITH ADDRESS AND CONTACT -->
    <div class="footer">
        <div class="footer-address">
             Ramwapur Dakahi, Post Katra, Ikauna, Shravasti, UP-271805
        </div>
        <div class="footer-contact">
             develishngo@zohomail.in | 📞 +91 9721061660
        </div>
    </div>
</div>

<script>
    let currentType = 'Letter';
    
    function changeMode(type) {
        currentType = type;
        document.getElementById('title').innerText = "Create " + type;
        document.getElementById('btnL').className = (type === 'Letter' ? 'active' : '');
        document.getElementById('btnA').className = (type === 'Application' ? 'active' : '');
    }
    
    function updatePreview() {
        document.getElementById('pRef').innerText = document.getElementById('refNo').value || 'N/A';
        document.getElementById('pDate').innerText = new Date().toLocaleDateString('en-GB');
        document.getElementById('pSub').innerText = document.getElementById('subject').value || 'N/A';
        document.getElementById('pTo').innerHTML = "To,<br>" + (document.getElementById('recipient').value || 'N/A');
        document.getElementById('pMat').innerText = document.getElementById('matter').value || 'No content';
        document.getElementById('pSignName').innerText = document.getElementById('senderName').value || 'Secretary';
        document.getElementById('pSignPos').innerText = document.getElementById('senderPos').value || 'Develish One Foundation';
    }
    
    // Real-time preview update
    document.getElementById('refNo').addEventListener('input', updatePreview);
    document.getElementById('subject').addEventListener('input', updatePreview);
    document.getElementById('recipient').addEventListener('input', updatePreview);
    document.getElementById('matter').addEventListener('input', updatePreview);
    document.getElementById('senderName').addEventListener('input', updatePreview);
    document.getElementById('senderPos').addEventListener('input', updatePreview);
    
    function saveToSheet() {
        const refNo = document.getElementById('refNo').value;
        const matter = document.getElementById('matter').value;
        
        if(!refNo) return alert("Please fill Ref/App Number!");
        if(!matter) return alert(" Please fill the Matter content!");
        
        const payload = {
            type: currentType,
            refNo: refNo,
            subject: document.getElementById('subject').value,
            recipient: document.getElementById('recipient').value,
            matter: matter,
            senderName: document.getElementById('senderName').value,
            senderPos: document.getElementById('senderPos').value,
            date: new Date().toLocaleDateString('en-GB')
        };
        
        document.getElementById('loading').style.display = 'block';
        
        google.script.run
            .withSuccessHandler(function(response) {
                document.getElementById('loading').style.display = 'none';
                if(response.success) {
                    alert(" + response.message);
                } else {
                    alert("Error: " + response.message);
                }
            })
            .withFailureHandler(function(error) {
                document.getElementById('loading').style.display = 'none';
                alert("Failed to save: " + error.message);
            })
            .saveData(payload);
    }
    
    function printDocument() {
        updatePreview();
        setTimeout(() => {
            window.print();
        }, 100);
    }
    
    function downloadPDF() {
        updatePreview();
        setTimeout(() => {
            window.print();
        }, 100);
    }
    
    // Initial preview
    updatePreview();
</script>
</body>
</html>
