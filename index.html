<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
        .navbar { background: #1a1a1a; color: white; padding: 15px; display: flex; gap: 15px; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .navbar button { background: transparent; border: 1px solid #4ade80; color: #4ade80; padding: 8px 18px; cursor: pointer; border-radius: 4px; font-weight: 600; }
        .navbar button.active { background: #4ade80; color: #1a1a1a; }
        
        .app-container { max-width: 850px; margin: 20px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        
        .sender-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; margin-bottom: 20px; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 12px; border-radius: 5px; color: white; font-weight: 600; cursor: pointer; }
        
        /* PRINT TEMPLATE */
        #printArea { display: none; width: 210mm; padding: 20mm; background: white; position: relative; box-sizing: border-box; margin: auto; }
        .lh-header { text-align: center; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 30px; }
        .lh-logo { max-width: 140px; }
        .lh-org { font-size: 26px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .lh-contact { font-size: 11px; margin-top: 5px; }
        .doc-meta { display: flex; justify-content: space-between; margin-bottom: 30px; font-size: 14px; }
        .doc-body { line-height: 1.6; text-align: justify; font-size: 15px; white-space: pre-wrap; min-height: 400px; }
        .lh-sign { margin-top: 60px; font-size: 15px; }

        @media print {
            .no-print { display: none !important; }
            #printArea { display: block !important; }
        }
    </style>
</head>
<body>

<div class="navbar no-print">
    <button id="btnL" class="active" onclick="changeMode('Letter')">1st Letter</button>
    <button id="btnA" onclick="changeMode('Application')">2nd Applicant</button>
</div>

<div class="app-container no-print">
    <h2 id="title">Develish One Foundation Portal</h2>
    
    <div class="sender-box">
        <label style="color: #2980b9;">SENDER DETAILS (Your Info)</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="senderName" placeholder="Your Name (e.g., John Doe)">
            <input type="text" id="senderPos" placeholder="Your Position (e.g., Secretary)">
        </div>
    </div>

    <div class="input-group">
        <label>Ref / App Number</label>
        <input type="text" id="refNo" placeholder="D1F/2026/001">
    </div>
    <div class="input-group">
        <label>Recipient / To Details</label>
        <textarea id="recipient" rows="2" placeholder="Receiver Name & Address"></textarea>
    </div>
    <div class="input-group">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="Document Subject">
    </div>
    <div class="input-group">
        <label>Matter</label>
        <textarea id="matter" rows="8" placeholder="Type your letter content..."></textarea>
    </div>

    <div class="button-row">
        <button class="btn" style="background: #2980b9;" onclick="runService('save')">1. Save to Sheet</button>
        <button class="btn" style="background: #27ae60;" onclick="runService('print')">2. Print</button>
        <button class="btn" style="background: #e67e22;" onclick="runService('pdf')">3. PDF</button>
    </div>
</div>

<div id="printArea">
    <div class="lh-header">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhEU8w_H9L2saAhkasgsXa74PpTuuqDCLfI6xlOX-x15imG0Zh22m7QH0K6aOY806F5N2btYWn9596nIsYGClysoH_9zUZZn5sU8BuFAQRf-oNSKRK9twSKkfLrFETAZEQ9htTmyi302UVBTp06iKReiN9AHdiiWNo6fRbdf9pycFXwvwKCl88SHr_osLf8/s320/1000071813.png" class="lh-logo">
        <div class="lh-org">Develish One Foundation</div>
        <div style="font-size:12px;">Reg No: U88900UP2025NPL220764</div>
        <div class="lh-contact">Ramwapur Dakahi, Post Katra, Ikauna, Shravasti, UP-271805<br>Email: develishngo@zohomail.in | Mob: +91 9721061660</div>
    </div>
    <div class="doc-meta">
        <div>Ref: <span id="pRef"></span></div>
        <div>Date: <span id="pDate"></span></div>
    </div>
    <div style="margin-bottom:20px; font-weight:600;" id="pTo"></div>
    <div style="margin-bottom:20px; font-weight:bold; text-decoration:underline;">Subject: <span id="pSub"></span></div>
    <div class="doc-body" id="pMat"></div>
    <div class="lh-sign">
        Sincerely,<br><br><br>
        <strong id="pSignName"></strong><br>
        <span id="pSignPos"></span><br>
        Develish One Foundation
    </div>
</div>

<script>
    let currentType = 'Letter';
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydJPcW9WCcuIzoRghs-Oi_oxpy-GgJR3Yk-JMwjM5R0IP3bAKO65rXcLPEVDCYFkGT/exec"; // <--- REPLACE THIS WITH YOUR DEPLOYED URL

    function changeMode(type) {
        currentType = type;
        document.getElementById('title').innerText = "Create " + type;
        document.getElementById('btnL').className = (type === 'Letter' ? 'active' : '');
        document.getElementById('btnA').className = (type === 'Application' ? 'active' : '');
    }

    function runService(action) {
        const payload = {
            type: currentType,
            refNo: document.getElementById('refNo').value,
            subject: document.getElementById('subject').value,
            recipient: document.getElementById('recipient').value,
            matter: document.getElementById('matter').value,
            senderName: document.getElementById('senderName').value,
            senderPos: document.getElementById('senderPos').value,
            date: new Date().toLocaleDateString('en-GB')
        };

        if(!payload.refNo || !payload.matter) return alert("Fill mandatory fields!");

        // Update Print Preview
        document.getElementById('pRef').innerText = payload.refNo;
        document.getElementById('pDate').innerText = payload.date;
        document.getElementById('pSub').innerText = payload.subject;
        document.getElementById('pTo').innerText = "To,\n" + payload.recipient;
        document.getElementById('pMat').innerText = payload.matter;
        document.getElementById('pSignName').innerText = payload.senderName;
        document.getElementById('pSignPos').innerText = payload.senderPos;

        // Call Google Apps Script
        google.script.run.withSuccessHandler(() => {
            if(action === 'save') alert("Saved to Google Sheet!");
            else window.print();
        }).saveData(payload);
    }
</script>
</body>
</html>
